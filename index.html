<style>
:root {
  --bg: #08080F;
  --surface: #0F0F1E;
  --border: #1A1A2E;
  --accent: #FF3D00;
  --yellow: #FFD600;
  --font-d: 'Bebas Neue', cursive;
  --font-m: 'Space Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: #fff; font-family: var(--font-m); }
#root { height: 100dvh; display: flex; flex-direction: column; }
::-webkit-scrollbar { width: 0; height: 0; }

@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes pulse-glow {
  0%,100% { box-shadow: 0 0 15px #FF3D00, 0 0 30px #FF3D0066; }
  50% { box-shadow: 0 0 30px #FF3D00, 0 0 60px #FF3D00, 0 0 90px #FF3D0066; }
}
@keyframes scan-sweep {
  0% { top: 0%; opacity: 1; }
  90% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}
@keyframes bracket-pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}
@keyframes slide-up {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes scale-burst {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes particle {
  0% { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx),var(--ty)) rotate(720deg) scale(0); opacity: 0; }
}
@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}
@keyframes spotlight-flicker {
  0%,100% { opacity: 1; }
  50% { opacity: 0.9; }
}

.shimmer-card { transition: transform 0.2s, box-shadow 0.2s; }
.shimmer-card:hover { transform: translateY(-2px); }
.shimmer-card:hover::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.06) 50%, transparent 60%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: inherit;
  pointer-events: none;
}
</style>
</head>

const INITIAL = [18, 26, 4]; // Corvette C8, BMW M3, Mazda Miata

function fmt(n) { return "$"+n.toLocaleString(); }

function pickCar() {
  const r = Math.random();
  let cum = 0;
  for (const rarity of ["common","uncommon","rare","epic","legendary","mythic"]) {
    cum += RC[rarity].chance;
    if (r < cum) {
      const pool = CARS.filter(c => c.rarity === rarity);
      return pool[Math.floor(Math.random() * pool.length)];
    }
  }
  return CARS[0];
}

function garageVal(col) {
  return [...col].reduce((s,id)=>{ const c=CARS.find(x=>x.id===id); return s+(c?c.msrp:0); },0);
}
function powerScore(col) {
  return [...col].reduce((s,id)=>{ const c=CARS.find(x=>x.id===id); return s+(c?RC[c.rarity].weight:0); },0);
}
function rarestIn(col) {
  const w={common:1,uncommon:2,rare:3,epic:4,legendary:5,mythic:6};
  return CARS.filter(c=>col.has(c.id)).sort((a,b)=>w[b.rarity]-w[a.rarity])[0];
}

/* ─── SHARED UI ATOMS ─────────────────────────────────── */
function Badge({rarity, lg}) {
  const c=RC[rarity];
  return <span style={{background:c.color+"22",border:`1px solid ${c.color}`,color:c.color,borderRadius:50,padding:lg?"6px 14px":"3px 8px",fontSize:lg?16:11,fontFamily:"var(--font-d)",letterSpacing:1,boxShadow:`0 0 8px ${c.color}55`}}>{c.label}</span>;
}

function Stars({rarity}) {
  const c=RC[rarity];
  return <span>{[0,1,2,3,4].map(i=><span key={i} style={{color:i<c.stars?c.color:"#333",fontSize:15}}>★</span>)}</span>;
}

function StatBox({icon,val,label}) {
  return (
    <div style={{background:"#0A0A14",border:"1px solid var(--border)",borderRadius:12,padding:"12px 10px"}}>
      <div style={{fontSize:18,marginBottom:2}}>{icon}</div>

      <div style={{fontFamily:"var(--font-m)",fontSize:8,color:"#555",marginTop:3}}>{label}</div>

}

/* ─── PARTICLES ───────────────────────────────────────── */
function Particles() {
  const colors=["#FF3D00","#FFD600","#FF6B9D","#A855F7","#60A5FA","#34D399","#FBBF24"];
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999}}>
      {Array.from({length:28},(_,i)=>{
        const a=(i/28)*360;
        const d=160+Math.random()*220;
        const tx=Math.cos(a*Math.PI/180)*d+"px";
        const ty=Math.sin(a*Math.PI/180)*d+"px";
        const sz=6+Math.random()*14;
        return <div key={i} style={{position:"absolute",left:"50%",top:"45%",width:sz,height:sz,borderRadius:i%3===0?"50%":"3px",background:colors[i%colors.length],"--tx":tx,"--ty":ty,animation:`particle 1.1s ${Math.random()*0.4}s ease forwards`}}/>;
      })}
    </div>
  );
}

function CardexTab({collected, onSelect}) {
  const [search, setSearch] = useState("");
  const [type, setType] = useState("All");
  const [rar, setRar] = useState("All");
  const types=["All","JDM","Muscle","Supercar","Hypercar","Electric","Luxury","SUV","Truck","GT"];
  const rarities=["All","common","uncommon","rare","epic","legendary","mythic"];
  const shown=CARS.filter(c=>{
    const ms=c.name.toLowerCase().includes(search.toLowerCase())||c.brand.toLowerCase().includes(search.toLowerCase());
    return ms && (type==="All"||c.type===type) && (rar==="All"||c.rarity===rar);
  });
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"14px 14px 0",background:"var(--bg)",flexShrink:0}}>
        <div style={{fontFamily:"var(--font-d)",fontSize:28,letterSpacing:2,marginBottom:8}}>CARDEX</div>

          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontFamily:"var(--font-m)",fontSize:10,color:"#666"}}>COLLECTED</span>
            <span style={{fontFamily:"var(--font-d)",fontSize:13,color:"var(--yellow)"}}>{collected.size}/{CARS.length}</span>
          </div>
          <div style={{height:4,background:"var(--border)",borderRadius:2}}>
            <div style={{height:"100%",width:`${(collected.size/CARS.length)*100}%`,background:"linear-gradient(90deg,var(--accent),var(--yellow))",borderRadius:2,transition:"width 0.4s"}}/>
          </div>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search cars..." style={{width:"100%",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:50,padding:"8px 14px",color:"#fff",fontFamily:"var(--font-m)",fontSize:12,outline:"none",marginBottom:8}}/>
        <div style={{display:"flex",overflowX:"auto",gap:5,marginBottom:6,paddingBottom:2}}>
          {types.map(t=><button key={t} onClick={()=>setType(t)} style={{flexShrink:0,background:type===t?"var(--accent)":"var(--surface)",border:type===t?"none":"1px solid var(--border)",color:type===t?"#fff":"#777",borderRadius:50,padding:"4px 11px",fontFamily:"var(--font-d)",fontSize:12,cursor:"pointer",letterSpacing:0.5}}>{t}</button>)}
        </div>

            const cfg=r==="All"?null:RC[r];

      <div style={{flex:1,overflowY:"auto",padding:"0 10px 100px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7}}>

      </div>

  );
}

/* ═══════════════════════════════════════════════════════════
   SCAN TAB
═══════════════════════════════════════════════════════════ */
function ScanTab({onFound, collected}) {
  const [phase, setPhase] = useState("idle");
  const [found, setFound] = useState(null);
  const [boom, setBoom] = useState(false);

  function doScan() {
    setPhase("scanning");
    setTimeout(()=>{
      const car=pickCar();
      setFound(car);
      setPhase("result");
      if(car.rarity==="legendary"||car.rarity==="mythic"){
        setBoom(true);
        setTimeout(()=>setBoom(false),1600);
      }
    },2300);
  }

  function add() { onFound(found); setFound(null); setPhase("idle"); }
  function again() { setFound(null); setPhase("idle"); }

  const c = found ? RC[found.rarity] : null;

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      {boom && <Particles/>}

      {/* viewfinder */}
      <div style={{flex:1,background:phase==="scanning"?"radial-gradient(ellipse at 50% 50%,#001208,#000900)":"radial-gradient(ellipse at 50% 50%,#0A0A18,var(--bg))",position:"relative",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.5s"}}>
        {/* brackets */}
        {[{t:50,l:30,r:0},{t:50,r:30,l:"auto",rot:90},{b:170,l:30,r:0,rot:270},{b:170,r:30,l:"auto",rot:180}].map((p,i)=>(
          <div key={i} style={{position:"absolute",top:p.t,bottom:p.b,left:p.l,right:p.r,width:36,height:36,borderTop:"3px solid var(--accent)",borderLeft:"3px solid var(--accent)",transform:`rotate(${p.rot||0}deg)`,animation:"bracket-pulse 1.5s infinite"}}/>
        ))}

        {phase==="scanning" && (
          <div style={{position:"absolute",left:36,right:36,height:2,background:"linear-gradient(90deg,transparent,#00FF41,transparent)",boxShadow:"0 0 12px #00FF41",animation:"scan-sweep 1s linear infinite"}}/>
        )}

        {phase==="idle" && (
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:60,marginBottom:10,opacity:0.35,animation:"float 3s infinite"}}>📷</div>
            <div style={{fontFamily:"var(--font-d)",fontSize:18,letterSpacing:3,color:"rgba(255,255,255,0.3)"}}>POINT AT ANY CAR</div>
          </div>
        )}

        {phase==="scanning" && (
          <div style={{textAlign:"center"}}>
            <div style={{fontFamily:"var(--font-d)",fontSize:26,letterSpacing:4,color:"#00FF41",animation:"bracket-pulse 0.5s infinite"}}>SCANNING...</div>
            <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"#00FF4188",marginTop:8}}>ANALYZING VEHICLE DATA</div>
          </div>
        )}

        {phase==="result" && found && (
          <div style={{textAlign:"center",animation:"scale-burst 0.5s cubic-bezier(0.34,1.56,0.64,1)"}}>
            <div style={{fontFamily:"var(--font-d)",fontSize:20,letterSpacing:4,color:c.color,marginBottom:8,textShadow:`0 0 24px ${c.color}`}}>CAR IDENTIFIED</div>
            <div style={{fontSize:72,filter:`drop-shadow(0 0 24px ${c.color})`}}>{found.emoji}</div>
            <div style={{fontFamily:"var(--font-d)",fontSize:28,color:"#fff",marginTop:8,lineHeight:1}}>{found.name}</div>
            <div style={{marginTop:8}}><Badge rarity={found.rarity} lg/></div>
          </div>
        )}
      </div>

      {/* bottom panel */}
      {phase!=="result" ? (
        <div style={{padding:"18px 24px 30px",background:"var(--bg)",borderTop:"1px solid var(--border)",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
          <button onClick={phase==="idle"?doScan:undefined} disabled={phase==="scanning"} className="scan-btn" style={{width:78,height:78,borderRadius:"50%",background:phase==="scanning"?"#222":"var(--accent)",border:"none",fontSize:30,cursor:phase==="scanning"?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.3s"}}>
            {phase==="scanning"?"⏳":"📷"}
          </button>
          <div style={{fontFamily:"var(--font-d)",fontSize:17,letterSpacing:2,color:phase==="scanning"?"#555":"#fff"}}>{phase==="scanning"?"SCANNING...":"TAP TO SCAN"}</div>
          <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"#444",textAlign:"center"}}>Scan any car to add it to your garage</div>
        </div>
      ) : (
        <div style={{padding:"14px 18px 28px",background:"var(--surface)",borderTop:`2px solid ${c.color}55`,boxShadow:`0 -8px 40px ${c.color}33`,animation:"slide-up 0.4s cubic-bezier(0.34,1.56,0.64,1)"}}>
          {found && (<>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:12}}>
              {[{v:found.hp,l:"HP"},{v:found.topSpeed,l:"MPH"},{v:found.z60+"s",l:"0-60"},{v:fmt(found.msrp),l:"MSRP"}].map(s=>(
                <div key={s.l} style={{background:"#0A0A14",border:"1px solid var(--border)",borderRadius:9,padding:"7px 4px",textAlign:"center"}}>
                  <div style={{fontFamily:"var(--font-d)",fontSize:13,color:"#fff"}}>{s.v}</div>
                  <div style={{fontFamily:"var(--font-m)",fontSize:8,color:"#555"}}>{s.l}</div>
                </div>
              ))}
            </div>
            <div style={{fontFamily:"var(--font-m)",fontSize:10,color:"#555",marginBottom:4}}>{found.engine} · {found.flag} · {found.type}</div>
            <div style={{marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
              <Stars rarity={found.rarity}/>
              <span style={{fontFamily:"var(--font-m)",fontSize:10,color:c.color}}>+{RC[found.rarity].xp} XP</span>
            </div>
            <div style={{display:"flex",gap:9}}>
              <button onClick={add} style={{flex:2,padding:"13px",background:collected.has(found.id)?"#333":"var(--accent)",border:"none",color:"#fff",borderRadius:50,fontFamily:"var(--font-d)",fontSize:17,cursor:"pointer",letterSpacing:1,boxShadow:collected.has(found.id)?"none":"0 4px 18px rgba(255,61,0,0.45)"}}>
                {collected.has(found.id)?"ALREADY OWNED ✓":"ADD TO GARAGE"}
              </button>
              <button onClick={again} style={{flex:1,padding:"13px",background:"transparent",border:"1px solid var(--border)",color:"#666",borderRadius:50,fontFamily:"var(--font-d)",fontSize:17,cursor:"pointer",letterSpacing:1}}>AGAIN</button>
            </div>
          </>)}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   GARAGE TAB — CINEMATIC 3D CAROUSEL
═══════════════════════════════════════════════════════════ */
function GarageTab({collected, onSelect}) {
  const [activeIndex, setActiveIndex] = useState(0);
  const [dragOffset, setDragOffset] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const [spotlightFlash, setSpotlightFlash] = useState(false);
  const [infoVisible, setInfoVisible] = useState(true);
  const [filterRarity, setFilterRarity] = useState("All");
  const [filterSort, setFilterSort] = useState("none");
  const isDraggingRef = useRef(false);
  const dragStartX = useRef(0);

  const myCars = useMemo(() => {
    let cars = CARS.filter(c => collected.has(c.id));
    if (filterRarity !== "All") cars = cars.filter(c => c.rarity === filterRarity);
    if (filterSort === "price-desc") cars = [...cars].sort((a, b) => b.msrp - a.msrp);
    if (filterSort === "price-asc")  cars = [...cars].sort((a, b) => a.msrp - b.msrp);
    return cars;
  }, [collected, filterRarity, filterSort]);

  const gv = garageVal(collected);

  useEffect(() => {
    if (myCars.length > 0 && activeIndex >= myCars.length)
      setActiveIndex(myCars.length - 1);
  }, [myCars.length, activeIndex]);

  function triggerSnap(idx) {
    const clamped = Math.max(0, Math.min(idx, myCars.length - 1));
    setInfoVisible(false);
    setIsDragging(false);
    isDraggingRef.current = false;
    setDragOffset(0);
    setActiveIndex(clamped);
    setSpotlightFlash(true);
    setTimeout(() => setSpotlightFlash(false), 150);
    setTimeout(() => setInfoVisible(true), 250);
  }

  function handleDragStart(clientX) {
    isDraggingRef.current = true;
    setIsDragging(true);
    dragStartX.current = clientX;
  }

  function handleDragMove(clientX) {
    if (!isDraggingRef.current) return;
    setDragOffset((clientX - dragStartX.current) * 0.85);
  }

  function handleDragEnd() {
    if (!isDraggingRef.current) return;
    if      (dragOffset < -80) triggerSnap(activeIndex + 1);
    else if (dragOffset >  80) triggerSnap(activeIndex - 1);
    else                       triggerSnap(activeIndex);
  }

  const SLOTS = [
    { rel:-2, x:-290, y:-35, scale:0.45, opacity:0.20, brightness:0.08, sat:0    },
    { rel:-1, x:-168, y:-18, scale:0.68, opacity:0.50, brightness:0.28, sat:0.15 },
    { rel: 0, x:   0, y:  0, scale:1.00, opacity:1.00, brightness:1.00, sat:1.0  },
    { rel: 1, x: 168, y:-18, scale:0.68, opacity:0.50, brightness:0.28, sat:0.15 },
    { rel: 2, x: 290, y:-35, scale:0.45, opacity:0.20, brightness:0.08, sat:0    },
  ];

  const activeCar = myCars[activeIndex];

  if (myCars.length === 0) {
    return (
      <div style={{flex:1,background:'#000',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.88) 100%)',pointerEvents:'none',zIndex:10}}/>
        <div style={{position:'absolute',bottom:0,left:'-20%',right:'-20%',height:'40%',background:'#0d0d0d',transform:'perspective(500px) rotateX(45deg)',transformOrigin:'bottom center',zIndex:5,borderTop:'1px solid #1c1c1c'}}/>
        <div style={{textAlign:'center',zIndex:20,padding:'0 30px'}}>
          <div style={{fontFamily:'var(--font-d)',fontSize:30,color:'#fff',letterSpacing:3,marginBottom:8}}>YOUR GARAGE IS EMPTY</div>
          <div style={{fontFamily:'var(--font-m)',fontSize:10,color:'#444',marginBottom:28}}>Hit the scanner to collect your first car</div>
          <div style={{width:64,height:64,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,margin:'0 auto',animation:'pulse-glow 2s infinite'}}>📷</div>
        </div>
      </div>
    );
  }

  return (
    <div
      style={{flex:1,background:'#000',display:'flex',flexDirection:'column',overflow:'hidden',position:'relative',userSelect:'none',touchAction:'none'}}
      onMouseDown={e=>handleDragStart(e.clientX)}
      onMouseMove={e=>handleDragMove(e.clientX)}
      onMouseUp={handleDragEnd}
      onMouseLeave={handleDragEnd}
      onTouchStart={e=>handleDragStart(e.touches[0].clientX)}
      onTouchMove={e=>{e.preventDefault();handleDragMove(e.touches[0].clientX);}}
      onTouchEnd={handleDragEnd}
    >
      {/* Vignette */}
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 50%,transparent 28%,rgba(0,0,0,0.84) 100%)',pointerEvents:'none',zIndex:30}}/>

      {/* Header */}
      <div style={{position:'absolute',top:0,left:0,right:0,display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'16px 18px 0',zIndex:40}}>
        <div>
          <div style={{fontFamily:'var(--font-m)',fontSize:9,color:'#444',letterSpacing:1}}>GARAGE VALUE</div>
          <div style={{fontFamily:'var(--font-d)',fontSize:28,color:'#fff',lineHeight:1}}>{fmt(gv)}</div>
        </div>
        <div style={{paddingTop:4}}>
          <div style={{fontFamily:'var(--font-m)',fontSize:11,color:'#444'}}>{collected.size} CARS</div>
        </div>
      </div>

      {/* Filter bar */}
      <div style={{position:'absolute',top:66,left:0,right:0,zIndex:40,background:'linear-gradient(to bottom,rgba(0,0,0,0.96) 60%,transparent)'}}>
        <div style={{display:'flex',gap:6,overflowX:'auto',padding:'6px 14px 10px',scrollbarWidth:'none'}}>
          {[
            {label:'All',      active:filterRarity==="All"&&filterSort==="none",    fn:()=>{setFilterRarity("All");setFilterSort("none");setActiveIndex(0);}},
            {label:'COMMON',   active:filterRarity==="common",                      fn:()=>{setFilterRarity("common");setFilterSort("none");setActiveIndex(0);}},
            {label:'UNCOMMON', active:filterRarity==="uncommon",                    fn:()=>{setFilterRarity("uncommon");setFilterSort("none");setActiveIndex(0);}},
            {label:'RARE',     active:filterRarity==="rare",                        fn:()=>{setFilterRarity("rare");setFilterSort("none");setActiveIndex(0);}},
            {label:'EPIC',     active:filterRarity==="epic",                        fn:()=>{setFilterRarity("epic");setFilterSort("none");setActiveIndex(0);}},
            {label:'LEGENDARY',active:filterRarity==="legendary",                  fn:()=>{setFilterRarity("legendary");setFilterSort("none");setActiveIndex(0);}},
            {label:'MYTHIC',   active:filterRarity==="mythic",                      fn:()=>{setFilterRarity("mythic");setFilterSort("none");setActiveIndex(0);}},
            {label:'Price ↓',  active:filterSort==="price-desc",                   fn:()=>{setFilterRarity("All");setFilterSort("price-desc");setActiveIndex(0);}},
            {label:'Price ↑',  active:filterSort==="price-asc",                    fn:()=>{setFilterRarity("All");setFilterSort("price-asc");setActiveIndex(0);}},
          ].map(f=>(
            <button key={f.label} onClick={f.fn} style={{flexShrink:0,background:f.active?'var(--accent)':'rgba(255,255,255,0.06)',border:f.active?'none':'1px solid #222',color:f.active?'#fff':'#555',borderRadius:50,padding:'4px 12px',fontFamily:'var(--font-d)',fontSize:11,cursor:'pointer',letterSpacing:0.5,transition:'all 0.2s',whiteSpace:'nowrap'}}>
              {f.label}
            </button>
          ))}
        </div>
      </div>

      {/* Spotlight cone */}
      <div style={{
        position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',
        width:240,height:'68%',pointerEvents:'none',zIndex:22,
        background:`radial-gradient(ellipse at 50% 0%,rgba(255,255,255,${spotlightFlash?0.26:0.08}) 0%,transparent 66%)`,
        transition:spotlightFlash?'none':'background 0.5s ease',
        animation:spotlightFlash?'none':'spotlight-flicker 2s ease-in-out infinite',
      }}/>

      {/* Concrete floor */}
      <div style={{
        position:'absolute',bottom:0,left:'-25%',right:'-25%',height:'44%',
        background:'#0b0b0b',
        backgroundImage:'repeating-linear-gradient(90deg,transparent,transparent 49px,#151515 49px,#151515 50px),repeating-linear-gradient(0deg,transparent,transparent 49px,#151515 49px,#151515 50px)',
        transform:'perspective(650px) rotateX(48deg)',
        transformOrigin:'bottom center',
        zIndex:6,
        borderTop:'1px solid #1a1a1a',
      }}/>

      {/* Carousel stage */}
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',zIndex:20,marginTop:118,marginBottom:130}}>
        {SLOTS.map(slot=>{
          const carIdx = activeIndex + slot.rel;
          if (carIdx < 0 || carIdx >= myCars.length) return null;
          const car = myCars[carIdx];
          const isCenter = slot.rel === 0;
          return (
            <div
              key={car.id}
              onClick={()=>isCenter && onSelect(car)}
              style={{
                position:'absolute',
                transform:`translateX(${slot.x+(isDragging?dragOffset:0)}px) translateY(${slot.y}px) scale(${slot.scale})`,
                transition:isDragging?'none':'transform 0.32s cubic-bezier(0.34,1.2,0.64,1),opacity 0.32s ease,filter 0.32s ease',
                opacity:slot.opacity,
                filter:`brightness(${slot.brightness}) saturate(${slot.sat})`,
                zIndex:10-Math.abs(slot.rel),
                cursor:isCenter?'pointer':'default',
                display:'flex',flexDirection:'column',alignItems:'center',
              }}
            >
              {isCenter && (
                <div style={{position:'absolute',bottom:-16,width:130,height:20,background:`radial-gradient(ellipse,${car.color}99,transparent 70%)`,borderRadius:'50%',filter:'blur(5px)'}}/>
              )}
              <div style={{
                fontSize:isCenter?90:74,lineHeight:1,
                filter:isCenter?`drop-shadow(0 0 24px ${car.color}bb)`:'none',
                animation:isCenter?'float 3s ease-in-out infinite':'none',
              }}>
                {car.emoji}
              </div>
              <div style={{width:isCenter?115:80,height:10,background:`radial-gradient(ellipse,${isCenter?car.color+'66':'#2a2a2a'},transparent 70%)`,marginTop:8,borderRadius:'50%'}}/>
            </div>
          );
        })}
      </div>

      {/* Front car info */}
      {activeCar && (
        <div style={{
          position:'absolute',bottom:0,left:0,right:0,
          padding:'18px 24px 32px',zIndex:35,textAlign:'center',
          opacity:infoVisible?1:0,transition:'opacity 0.3s ease',
          background:'linear-gradient(to top,rgba(0,0,0,0.97) 60%,transparent)',
          pointerEvents:'none',
        }}>
          <div style={{fontFamily:'var(--font-d)',fontSize:34,color:'#fff',letterSpacing:2,lineHeight:1,marginBottom:8,textShadow:`0 0 40px ${RC[activeCar.rarity].color}55`}}>
            {activeCar.name}
          </div>
          <div style={{display:'flex',justifyContent:'center',gap:10,marginBottom:8,alignItems:'center'}}>
            <Badge rarity={activeCar.rarity} lg/>
          </div>
          <div style={{fontFamily:'var(--font-m)',fontSize:13,color:'var(--yellow)',marginBottom:8}}>{fmt(activeCar.msrp)}</div>
          <Stars rarity={activeCar.rarity}/>
        </div>
      )}
    </div>
  );
}

        </div>
      </div>

      {/* Leaderboard */}
      <div style={{padding:"0 14px"}}>
        <div style={{fontFamily:"var(--font-d)",fontSize:18,letterSpacing:1,marginBottom:10}}>LEADERBOARDS</div>
        <div style={{display:"flex",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:50,padding:3,marginBottom:12}}>
          {["Global","Friends"].map(m=><button key={m} onClick={()=>setLbMode(m)} style={{flex:1,background:lbMode===m?"var(--accent)":"transparent",border:"none",color:lbMode===m?"#fff":"#555",borderRadius:50,padding:"7px",fontFamily:"var(--font-d)",fontSize:15,cursor:"pointer",letterSpacing:1,transition:"background 0.2s"}}>{m}</button>)}
        </div>
        {lb.map(e=>(
          <div key={e.rank} style={{display:"flex",alignItems:"center",background:e.me?"rgba(255,61,0,0.1)":"var(--surface)",border:`1px solid ${e.me?"var(--accent)":"var(--border)"}`,borderRadius:12,padding:"11px 13px",marginBottom:7}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:e.rank===1?"#FFD600":e.rank===2?"#C0C0C0":e.rank===3?"#CD7F32":"var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--font-d)",fontSize:14,color:e.rank<=3?"#000":"#666",marginRight:11,flexShrink:0}}>{e.rank<=3?["🥇","🥈","🥉"][e.rank-1]:`#${e.rank}`}</div>
            <div style={{flex:1,fontFamily:"var(--font-d)",fontSize:15,color:e.me?"var(--accent)":"#fff"}}>{e.name}{e.me?" (YOU)":""}</div>
            <div style={{fontFamily:"var(--font-d)",fontSize:13,color:"var(--yellow)"}}>{fmt(e.val)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════════ */
function App() {
  const [tab, setTab] = useState("scan");
  const [collected, setCollected] = useState(new Set(INITIAL));
  const [xp, setXp] = useState(INITIAL.reduce((s,id)=>{const c=CARS.find(x=>x.id===id);return s+(c?RC[c.rarity].xp:0);},0));
  const [modal, setModal] = useState(null);

  function onFound(car) {
    if(!collected.has(car.id)) {
      setCollected(p=>new Set([...p,car.id]));
      setXp(p=>p+RC[car.rarity].xp);
    }
  }

  const TABS=[
    {id:"map",     icon:"🗺️",  label:"Map"},
    {id:"cardex",  icon:"📖",  label:"CarDex"},
    {id:"scan",    icon:"📷",  label:"SCAN",   primary:true},
    {id:"garage",  icon:"🏎️",  label:"Garage"},
    {id:"profile", icon:"👤",  label:"Profile"},
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100dvh",maxWidth:430,margin:"0 auto",background:"var(--bg)",overflow:"hidden",position:"relative"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",animation:"fade-in 0.18s ease"}} key={tab}>
        {tab==="map"     && <MapTab/>}
        {tab==="cardex"  && <CardexTab collected={collected} onSelect={setModal}/>}
        {tab==="scan"    && <ScanTab onFound={onFound} collected={collected}/>}
        {tab==="garage"  && <GarageTab collected={collected} onSelect={setModal}/>}
        {tab==="profile" && <ProfileTab collected={collected} xp={xp}/>}
      </div>

      {/* bottom nav */}
      <div style={{display:"flex",background:"rgba(8,8,15,0.97)",borderTop:"1px solid var(--border)",backdropFilter:"blur(12px)",paddingBottom:"env(safe-area-inset-bottom,6px)"}}>
        {TABS.map(t=>{
          const active=tab===t.id;
          return (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"transparent",border:"none",padding:t.primary?"6px 0 5px":"9px 0 7px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
              {t.primary?(
                <div style={{width:54,height:54,borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,marginTop:-22,border:"3px solid var(--bg)",boxShadow:active?"0 0 24px rgba(255,61,0,0.8),0 0 48px rgba(255,61,0,0.4)":"0 0 16px rgba(255,61,0,0.5)",animation:"pulse-glow 2s infinite"}}>📷</div>
              ):(
                <span style={{fontSize:18,filter:active?"none":"grayscale(0.7)",opacity:active?1:0.6}}>{t.icon}</span>
              )}
              {active&&!t.primary&&<div style={{position:"absolute",top:0,left:"20%",right:"20%",height:2,background:"var(--accent)",borderRadius:2}}/>}
              <span style={{fontFamily:"var(--font-d)",fontSize:t.primary?8:10,color:active&&!t.primary?"var(--accent)":"#555",letterSpacing:0.5}}>{t.label}</span>
            </button>
          );
        })}
      </div>

      {modal && <Modal car={modal} onClose={()=>setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
